name: Build iOS → TestFlight

# Deux façons de lancer un build natif (cloud EAS, zéro ordinateur) :
#  - À la main : Actions → "Build iOS → TestFlight" → Run workflow.
#  - Auto : pousser une modif du fichier marqueur apps/mobile/.native-build
#    (permet de déclencher un build natif sans le bouton "Run workflow").
# Par défaut on envoie sur TestFlight (sauf si on choisit submit=false à la main).

on:
  workflow_dispatch:
    inputs:
      submit:
        description: 'Envoyer sur TestFlight après le build ?'
        type: boolean
        default: true
  push:
    branches: [claude/voip-saas-design-icrutw]
    paths: ['apps/mobile/.native-build']

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install deps
        run: npm install

      - name: Write App Store Connect API key
        run: echo "${{ secrets.ASC_API_KEY_BASE64 }}" | base64 -d > asc-key.p8
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}

      - name: Build (+ submit) iOS
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # submit par défaut (déclenchement par push) ; submit=false uniquement
          # si choisi explicitement via Run workflow.
          if [ "${{ inputs.submit }}" = "false" ]; then
            eas build --platform ios --profile production --non-interactive
          else
            eas build --platform ios --profile production --non-interactive --auto-submit
          fi
