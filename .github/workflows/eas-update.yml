name: EAS Update (OTA)

# Publie une mise à jour OTA (JS) sur le canal production, dans le cloud.
# Déclenchable à la main / via API. Le code publié est celui de la branche
# choisie au déclenchement (ref).

on:
  # Auto : publie l'OTA dès qu'une modif mobile est poussée sur la branche.
  push:
    branches: [claude/voip-saas-design-icrutw]
    paths: ['apps/mobile/**']
  # Manuel : déclenchable depuis l'onglet Actions.
  workflow_dispatch:
    inputs:
      message:
        description: 'Message de la mise à jour'
        type: string
        default: 'update'

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install deps
        run: npm install

      - name: Publish OTA update
        env:
          MSG: ${{ inputs.message || github.sha }}
        run: eas update --branch production --message "$MSG" --non-interactive
